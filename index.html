<!DOCTYPE html>
<!--
  統合シェル（タブの器）。ここは原則いじらない。
  1日の流れ順に3タブへフラット化：
    🌅明朝5–8  = morning-routine の内部タブ "morning"
    📅今日の予定 = today.html（毎日ここだけ差し替える）
    🌙前夜の準備 = morning-routine の内部タブ "night"
  morning-routine は同一オリジンなので、iframe内のタブを直接クリックし、
  内部のタブバーは隠してタブの二重表示をなくしている。
  （もし向こうのDOM構造が変わっても、隠せないだけで壊れないようにしてある）
-->
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>今日の段取り</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
<meta name="apple-mobile-web-app-title" content="段取り">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f1115">
<style>
  :root{
    --bg:#0f1115; --card:#171a21; --line:#262b36; --text:#e7eaf0; --sub:#8b93a3;
    --accent:#4f8cff; --morning:#e0a63c; --night:#7b6cf6;
  }
  /* 朝ルーティンに合わせて常時ダーク（ライトモードには追従しない） */
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
    display:flex;flex-direction:column;overflow:hidden}
  /* タブ帯: 画面いっぱいに広げず、本文と同じ幅に収めて中央寄せ */
  .tabbar{flex:0 0 auto;background:var(--bg);border-bottom:1px solid var(--line);
    padding:8px 10px;padding-top:calc(8px + env(safe-area-inset-top))}
  .tabs{display:flex;gap:4px;max-width:560px;margin:0 auto;
    background:var(--card);border:1px solid var(--line);border-radius:12px;padding:4px}
  .tab{flex:1 1 0;min-width:0;text-align:center;padding:8px 4px;border:0;
    border-radius:9px;background:transparent;color:var(--sub);font-size:12.5px;font-weight:700;
    cursor:pointer;user-select:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    transition:background .15s,color .15s}
  .tab:not(.on):hover{color:var(--text);background:rgba(255,255,255,.05)}
  .tab.on{color:#fff}
  #tabM.on{background:var(--morning)}
  #tabS.on{background:var(--accent)}
  #tabN.on{background:var(--night)}
  .panes{flex:1 1 auto;position:relative;min-height:0}
  iframe{position:absolute;inset:0;width:100%;height:100%;border:0;display:none;background:var(--bg)}
  iframe.on{display:block}
</style>
</head>
<body>
<div class="tabbar">
  <div class="tabs">
    <div class="tab" id="tabM">🌅 明朝5–8</div>
    <div class="tab" id="tabS">📅 今日の予定</div>
    <div class="tab" id="tabN">🌙 前夜の準備</div>
  </div>
</div>
<div class="panes">
  <iframe id="fM" title="朝ルーティン" src="https://mizu-uki.github.io/morning-routine/"></iframe>
  <!-- src は日付付きでJSから設定（日をまたいだら必ず最新の today.html を取りに行くため） -->
  <iframe id="fS" title="今日の予定"></iframe>
</div>

<script>
  var fM = document.getElementById('fM'), fS = document.getElementById('fS');
  var BTN = { m: document.getElementById('tabM'),
              s: document.getElementById('tabS'),
              n: document.getElementById('tabN') };
  var INNER = { m: 'morning', n: 'night' };   // morning-routine 側の data-t
  var KEY = 'shell-tab';
  var wanted = null;   // 朝アプリで表示したい内部タブ

  // 「今日の予定」タブと重複するブロックは朝タブ側で隠す（埋め込み時のみ。朝アプリ単体には影響しない）
  //   m2a = 簿記2級（→ 予定タブの「資格勉強120分」）
  //   m4a = ブログ執筆（→ 予定タブの「ブログ記事執筆」）
  var DUP = ['m2a', 'm4a'];

  // iframe内(同一オリジン)のタブを操作し、内部タブバーと重複ブロックを隠す
  function applyInner(name){
    try{
      var doc = fM.contentDocument;
      if(!doc || !doc.body) return false;
      if(!doc.getElementById('shell-hide-tabs')){
        var st = doc.createElement('style');
        st.id = 'shell-hide-tabs';
        st.textContent = '.tabs{display:none !important}';
        (doc.head || doc.documentElement).appendChild(st);
      }
      DUP.forEach(function(id){
        var input = doc.querySelector('input[data-id="' + id + '"]');
        if(!input) return;                       // 見つからなければ何もしない
        var blk = input.closest('.block');
        if(blk) blk.style.display = 'none';
      });
      var t = doc.querySelector('.tab[data-t="' + name + '"]');
      if(!t) return false;
      t.click();
      return true;
    }catch(e){ return false; }   // 構造変更や取得失敗時は何もしない（元の表示に戻るだけ）
  }
  fM.addEventListener('load', function(){ if(wanted) applyInner(wanted); });

  function today(){
    var d = new Date();
    return d.getFullYear() + '-' + (d.getMonth()+1) + '-' + d.getDate();
  }

  // 日付をクエリに付けて読み込む＝日が変われば必ず新しい today.html を取得する
  // （同じ日の中では通常どおりキャッシュが効く）
  fS.src = 'today.html?d=' + today();

  function show(which, remember){
    for(var k in BTN){ BTN[k].classList.toggle('on', k === which); }
    var useMorning = (which !== 's');
    fM.classList.toggle('on', useMorning);
    fS.classList.toggle('on', !useMorning);
    if(useMorning){
      wanted = INNER[which];
      applyInner(wanted);          // 読み込み済みなら即反映。未了ならload時に反映
    }
    if(remember){
      try{ localStorage.setItem(KEY, JSON.stringify({d: today(), t: which})); }catch(e){}
    }
  }
  BTN.m.addEventListener('click', function(){ show('m', true); });
  BTN.s.addEventListener('click', function(){ show('s', true); });
  BTN.n.addEventListener('click', function(){ show('n', true); });

  // 初期表示: 同じ日に手動で選んだタブがあればそれを、なければ時刻で判断
  //   4:00–11:59 → 明朝 / 12:00–19:59 → 今日の予定 / 20:00–3:59 → 前夜の準備
  (function(){
    var pick = null;
    try{
      var s = JSON.parse(localStorage.getItem(KEY) || 'null');
      if(s && s.d === today() && BTN[s.t]) pick = s.t;
    }catch(e){}
    if(!pick){
      var h = new Date().getHours();
      pick = (h >= 4 && h < 12) ? 'm' : (h >= 20 || h < 4) ? 'n' : 's';
    }
    show(pick, false);
  })();

  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('sw.js').catch(function(){});
  }
</script>
</body>
</html>
