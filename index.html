<!DOCTYPE html>
<!--
  統合シェル（タブの器）。ここは原則いじらない。
  ・🌅朝ルーティン = mizu-uki.github.io/morning-routine/ をそのまま埋め込み（あちらを更新すれば自動反映）
  ・📅今日の予定   = today.html を埋め込み（毎日ここだけ差し替える）
-->
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>今日の段取り</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
<meta name="apple-mobile-web-app-title" content="段取り">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f1115">
<style>
  :root{
    --bg:#0f1115; --card:#171a21; --line:#262b36; --text:#e7eaf0; --sub:#8b93a3;
    --accent:#4f8cff; --morning:#e0a63c;
  }
  @media (prefers-color-scheme: light){
    :root{ --bg:#f5f6f8; --card:#ffffff; --line:#e6e8ec; --text:#1b1f27; --sub:#6b7280; }
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
    display:flex;flex-direction:column;overflow:hidden}
  .tabs{display:flex;gap:6px;padding:8px 10px;background:var(--bg);
    border-bottom:1px solid var(--line);padding-top:calc(8px + env(safe-area-inset-top));flex:0 0 auto}
  .tab{flex:1;text-align:center;padding:9px 6px;border:1px solid var(--line);border-radius:9px;
    background:var(--card);color:var(--sub);font-size:13px;font-weight:700;cursor:pointer;user-select:none;
    transition:background .15s,color .15s,border-color .15s}
  .tab.on{color:#fff;border-color:transparent}
  #tabM.on{background:var(--morning)}
  #tabS.on{background:var(--accent)}
  .panes{flex:1 1 auto;position:relative;min-height:0}
  iframe{position:absolute;inset:0;width:100%;height:100%;border:0;display:none;background:var(--bg)}
  iframe.on{display:block}
</style>
</head>
<body>
<div class="tabs">
  <div class="tab" id="tabM">🌅 朝ルーティン</div>
  <div class="tab" id="tabS">📅 今日の予定</div>
</div>
<div class="panes">
  <iframe id="fM" title="朝ルーティン" src="https://mizu-uki.github.io/morning-routine/"></iframe>
  <iframe id="fS" title="今日の予定" src="today.html"></iframe>
</div>

<script>
  var tabM = document.getElementById('tabM'), tabS = document.getElementById('tabS');
  var fM = document.getElementById('fM'), fS = document.getElementById('fS');
  var KEY = 'shell-tab';

  function today(){
    var d = new Date();
    return d.getFullYear() + '-' + (d.getMonth()+1) + '-' + d.getDate();
  }
  function show(which, remember){
    var m = which === 'm';
    tabM.classList.toggle('on', m);  tabS.classList.toggle('on', !m);
    fM.classList.toggle('on', m);    fS.classList.toggle('on', !m);
    if(remember){
      try{ localStorage.setItem(KEY, JSON.stringify({d: today(), t: which})); }catch(e){}
    }
  }
  tabM.addEventListener('click', function(){ show('m', true); });
  tabS.addEventListener('click', function(){ show('s', true); });

  // 初期表示: 同じ日に手動で選んだタブがあればそれを、なければ時刻で判断（9時前は朝ルーティン）
  (function(){
    var pick = null;
    try{
      var s = JSON.parse(localStorage.getItem(KEY) || 'null');
      if(s && s.d === today()) pick = s.t;
    }catch(e){}
    if(!pick) pick = (new Date().getHours() < 9) ? 'm' : 's';
    show(pick, false);
  })();

  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('sw.js').catch(function(){});
  }
</script>
</body>
</html>
